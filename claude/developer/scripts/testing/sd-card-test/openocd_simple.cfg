# Simple OpenOCD config for STM32F7
source [find interface/stlink.cfg]
transport select swd
adapter speed 4000
reset_config srst_only srst_gates_jtag

# Create DAP and target manually to avoid conflicts
dap create stm32f7.dap -chain-position 0x0
target create stm32f7.cpu testee -dap stm32f7.dap

gdb_port 3333
telnet_port 4444
tcl_port 6666

init
