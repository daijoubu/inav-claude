# OpenOCD configuration for MATEKF765SE (STM32F765)
# Used for SD card blocking measurement tests

source [find interface/stlink.cfg]

# STM32F7 specific settings
set CHIPNAME stm32f7x
source [find target/stm32f7x.cfg]

# Faster adapter speed for F7
adapter speed 4000

# Reset configuration
# Enable JTAG after reset for halt operations during MSC exit
reset_config srst_only srst_gates_jtag

# Work area in SRAM
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x10000 -work-area-backup 0

# GDB port
gdb_port 3333

# Telnet port for commands
telnet_port 4444

# TCL port
tcl_port 6666

# Don't halt on connect (keep FC running)
init
reset init
