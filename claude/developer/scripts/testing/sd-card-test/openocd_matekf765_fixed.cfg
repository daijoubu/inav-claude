# OpenOCD configuration for MATEKF765SE (STM32F765)
# Used for SD card blocking measurement tests
# This version does NOT halt the target - connects to running FC

source [find interface/stlink.cfg]

# STM32F7 specific settings - only configure transport
transport select swd

# Reset configuration
reset_config srst_only srst_gates_jtag

# Manually create target without sourcing stm32f7x.cfg
if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME stm32f7
}

if { [info exists CPUTAPID] } {
    set _CPUTAPID $CPUTAPID
} else {
    # Default ARM Cortex-M7 TAPID
    set _CPUTAPID 0x5ba00477
}

# Create DAP
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# Create target
target create $_CHIPNAME.cpu testee -chain-position $_CHIPNAME.dap

# Configure work area in SRAM
$_CHIPNAME.cpu configure -work-area-phys 0x20000000 -work-area-size 0x40000 -work-area-backup 0

# GDB port
gdb_port 3333

# Telnet port for commands
telnet_port 4444

# TCL port
tcl_port 6666

# Initialize (connect without halting)
init
# Do NOT reset - keep FC running
