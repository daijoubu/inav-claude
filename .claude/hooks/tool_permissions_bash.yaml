bash_rules:
  # ===================================================================
  # Path Safety Rules (Project-Specific)
  # ===================================================================
  # IMPORTANT: These must come first to catch dangerous patterns early

  - name: "Block mkdir to wrong claude paths"
    command_pattern: "^mkdir$"
    argument_pattern: ".*(inav/claude|inav2/claude|inav-configurator/claude|inavwiki/claude|PrivacyLRS/claude).*"
    category: write
    decision: deny
    message: "STOP! The claude/ directory is at ~/inavflight/claude/, NOT inside inav/, inav2/, inav-configurator/, inavwiki/, or PrivacyLRS/. Use the correct path when creating directories."

  - name: "Allow mkdir for new projects in claude/projects/active"
    command_pattern: "^mkdir$"
    argument_pattern: ".*(claude/)?projects/active/.*"
    category: write
    decision: allow
    precondition_script: |
      # Verify that the parent directory (claude/projects/active) exists
      # This prevents creating projects in the wrong location
      if [ -d "claude/projects/active" ] || [ -d "/home/raymorris/Documents/planes/inavflight/claude/projects/active" ]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Creating new project directory under claude/projects/active/"

  - name: "Block cp/mv to wrong claude paths"
    command_pattern: "^(cp|mv)$"
    argument_pattern: ".*(inav/claude|inav2/claude|inav-configurator/claude|inavwiki/claude|PrivacyLRS/claude).*"
    category: write
    decision: deny
    message: "STOP! The claude/ directory is at ~/inavflight/claude/, NOT inside inav/, inav2/, inav-configurator/, inavwiki/, or PrivacyLRS/. Use the correct destination path."

  - name: "Allow project moves between active/completed"
    command_pattern: "^(cp|mv)$"
    argument_pattern: ".*(claude/projects/(active|completed)).*"
    category: write
    decision: allow
    message: "Manager project organization - moving between active and completed directories"

  - name: "Allow cp of .uf2 files to RP2350 media directory"
    command_pattern: "^cp$"
    argument_pattern: ".*\\.uf2.*(/media/raymorris/RP2350/).*"
    category: write
    decision: allow
    message: "Copy RP2350 firmware .uf2 files to device media directory for flashing"

  # ===================================================================
  # Git Safety Rules (Deny before Allow)
  # ===================================================================

  - name: "Block git add -A"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?add -A"
    category: write
    decision: deny
    message: "STOP! IMPORTANT: Do NOT run 'git add -A'. Add the specific files you actually want."

  - name: "Allow git push to master in root inavflight/ repo only"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?push.*(master|main).*"
    category: write
    decision: allow
    precondition_script: |
      # Allow push to master ONLY in root inavflight/ repo, not in sub-repos
      # The script runs in the working directory where the git command would execute
      # Root repo path ends with /inavflight or /inavflight/
      # Sub-repo paths contain /inav/, /inav-configurator/, /PrivacyLRS/, /mspapi2/, /inavwiki/

      # Get the current working directory (pwd is executed in the cwd passed to subprocess.run)
      ABS_CWD=$(pwd)

      if [ -z "$ABS_CWD" ]; then
        # Can't determine path, deny for safety
        echo "deny"
        exit 0
      fi

      # Check if we're in the root inavflight repo (no sub-repo in path)
      # Root repo path should NOT be /path/to/inav, /path/to/inav-configurator, etc.
      # We check if the path contains /(dirname)/ or ends with /(dirname)
      if echo "$ABS_CWD" | grep -qE "/(inav|inav-configurator|PrivacyLRS|mspapi2|inavwiki)(/|$)"; then
        # We're in a sub-repo, deny this push
        echo "deny"
      else
        # We're in root or other safe location, allow
        echo "allow"
      fi
    message: "Push to master/main allowed for root inavflight/ repo only. Use feature branches for inav/, inav-configurator/, and other sub-repos."

  - name: "Allow git push to origin with -u flag (feature branches)"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?push\\s+origin\\s+[^-].*-u"
    category: write
    decision: allow
    message: "Push to feature/release branch on origin with -u flag allowed for tracking"

  - name: "Block git push to maintenance/master in sub-repos"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?push.*(maintenance|master|main).*"
    category: write
    decision: deny
    message: "STOP! IMPORTANT: Do NOT push to a version branch (maintenance-9.x, maintenance-10.x) or to master/main in sub-repos. Use your create-pr skill with a feature branch."

  - name: "Block git force push"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?push.*force.*"
    category: write
    decision: deny
    message: "STOP! IMPORTANT: Do NOT force push! That will break public history!"

  - name: "Block branch creation in root inavflight/ repo"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?((checkout\\s+-b)|(branch\\s+(?!-[a-z]*(-|l|a|r|v|d|m|n|s|t|show|list|all|remotes|verbose|delete|merged|no-merged|show-current|track)))|(switch\\s+(-c|--create))).*"
    category: write
    decision: deny
    precondition_script: |
      # Allow branch creation in sub-repos (inav, inav2, inav-configurator, PrivacyLRS, mspapi2, inavwiki, OpenTX-Telemetry-Widget, blackbox-tools, iNavFlight.github.io)
      # Block branch creation ONLY in the root inavflight/ repo
      #
      # The precondition_script needs to handle two cases:
      # 1. Direct commands: git branch -b feature (check pwd)
      # 2. Chained commands: cd /path/to/inav && git branch -b feature (check {ORIGINAL_COMMAND} for cd)

      ABS_CWD=$(pwd)

      if [ -z "$ABS_CWD" ]; then
        # Can't determine path, deny for safety
        echo "deny"
        exit 0
      fi

      # Check if the ORIGINAL_COMMAND contains a cd to a sub-repo
      # Pattern: cd ... /inav, /inav2, /inav-configurator, /PrivacyLRS, /mspapi2, /inavwiki, /OpenTX-Telemetry-Widget, /blackbox-tools, or /iNavFlight.github.io
      # This handles cases like: cd /home/.../inav && git branch -b feature
      ORIGINAL_CMD="{ORIGINAL_COMMAND}"
      if [ -n "$ORIGINAL_CMD" ] && echo "$ORIGINAL_CMD" | grep -qE "cd\\s+[^&|;]*/(inav2|inav|inav-configurator|PrivacyLRS|mspapi2|inavwiki|OpenTX-Telemetry-Widget|blackbox-tools|iNavFlight\\.github\\.io)(/|$|\\s+)"; then
        # The original command contains a cd into a sub-repo, allow branch creation
        echo "allow"
        exit 0
      fi

      # Check if we're in a sub-repo (contains /inav2/, /inav/, /inav-configurator/, /PrivacyLRS/, /mspapi2/, /inavwiki/, /OpenTX-Telemetry-Widget/, /blackbox-tools/, or /iNavFlight.github.io/)
      if echo "$ABS_CWD" | grep -qE "/(inav2|inav|inav-configurator|PrivacyLRS|mspapi2|inavwiki|OpenTX-Telemetry-Widget|blackbox-tools|iNavFlight\\.github\\.io)(/|$)"; then
        # We're in a sub-repo, allow branch creation here
        echo "allow"
      else
        # We're in root inavflight/ repo, deny branch creation
        echo "deny"
      fi
    message: "Branch creation blocked in root inavflight/ repo. Branches should be created in the appropriate project repo instead: inav/, inav2/, inav-configurator/, PrivacyLRS/, mspapi2/, inavwiki/, OpenTX-Telemetry-Widget/, blackbox-tools/, or iNavFlight.github.io/."

  - name: "Block git commit with Claude mentions"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?commit.*"
    category: write
    decision: ask
    precondition_script: |
      # Block commits that mention Claude, Co-Authored-By, or noreply@anthropic.com
      # The commit message may be in a heredoc or direct string
      ORIGINAL_CMD="{ORIGINAL_COMMAND}"

      # Safety check: if ORIGINAL_COMMAND is empty or not substituted, allow the commit
      # (let default rules handle it)
      if [ -z "$ORIGINAL_CMD" ]; then
        echo "allow"
        exit 0
      fi

      if echo "$ORIGINAL_CMD" | grep -qiE "(Co-Authored|noreply@anthropic)"; then
        echo "deny"
      else
        echo "allow"
      fi
    message: "❌ REJECTION: Commit message contains 'Co-Authored-By' or 'noreply@anthropic.com'. Do NOT mention Claude in public commit messages. Remove the attribution line and try again."

  # Git log/show operations (read-only, safe)
  - name: "Allow git log and show (read operations)"
    command_pattern: "^(GIT_PAGER=cat|git)$"
    argument_pattern: "^(git\\s+)?(log|show).*"
    category: read
    decision: allow
    message: "Git log/show read operations (GIT_PAGER=cat prevents pager from blocking output)"

  # Git read operations (safe)
  - name: "Allow git read operations"
    command_pattern: "^git$"
    argument_pattern: "^(-c\\s+safe\\.directory=\\S+\\s+)?(-C\\s+\\S+\\s+)?(status|log|diff|show|branch|remote|describe|rev-parse|rev-list|cat-file|ls-tree|ls-files|grep|merge-base|blame|tag|fetch).*"
    category: read
    decision: allow

  - name: "Allow git pull"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?pull.*"
    category: write
    decision: allow

  - name: "Allow git checkout/stash/cherry-pick"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?(checkout|stash|cherry-pick|restore).*"
    category: write
    decision: allow

  - name: "Git commit reminder"
    command_pattern: "^git$"
    argument_pattern: "^(-C\\s+\\S+\\s+)?commit.*"
    category: write
    decision: allow
    message: "Git commit detected - reminder added about not mentioning Claude/AI in commit messages"

  # ===================================================================
  # Find and Echo Command Rules
  # ===================================================================

  - name: "Allow find -exec with read commands, ask for others"
    command_pattern: "^find$"
    argument_pattern: ".*-exec\\s+(grep|egrep|cat|ls|head|tail|file|stat|wc|diff)\\s+.*"
    category: read
    decision: allow

  - name: "Ask for find -exec with non-read commands"
    command_pattern: "^find$"
    argument_pattern: ".*-exec.*"
    category: other
    decision: ask
    message: "find with -exec requires approval"

  - name: "Ask for echo with file redirection, allow otherwise"
    command_pattern: "^echo$"
    argument_pattern: ".*>>?.*"
    category: write
    decision: ask
    message: "echo with file redirection requires approval"

  - name: "Allow echo without redirection"
    command_pattern: "^echo$"
    category: read
    decision: allow

  # ===================================================================
  # Cat/Heredoc Write Rules
  # ===================================================================
  # Handle patterns like: cat > file << 'EOF' or cat > file <<EOF

  - name: "Allow cat > to claude/ and lock files, ask for others"
    command_pattern: "^cat$"
    argument_pattern: "^>\\s+.*(claude/|locks/.*\\.lock).*"
    category: write
    decision: allow

  - name: "Ask for cat > to other locations"
    command_pattern: "^cat$"
    argument_pattern: "(^|\\s)>>?"
    category: write
    decision: ask
    message: "cat with stdout redirection requires approval"

  # ===================================================================
  # Email/Inbox File Operations
  # ===================================================================

  - name: "Allow cp/mv within role email directories"
    command_pattern: "^(cp|mv)$"
    argument_pattern: ".*(claude/(developer|manager|release-manager|security-analyst)/(inbox|sent|inbox-archive|email)).*"
    category: write
    decision: allow

  # ===================================================================
  # Safe File Operations
  # ===================================================================

  - name: "Allow safe file operations (tmp, claude-*, SITL, CMake)"
    command_pattern: "^(rm|cp|mv|touch|mkdir)$"
    argument_pattern: ".*/tmp/(claude-.*|.*)|^/tmp/(claude-.*|.*)|^-[pf] /tmp/(claude-.*|.*)|.*eeprom\\.bin.*|^-f CMakeCache\\.txt$"
    category: write
    decision: allow
    message: "Safe file operations allowed for /tmp/ and /tmp/claude-* directories"

  - name: "Allow rm of ninja build cache files"
    command_pattern: "^rm$"
    argument_pattern: "^-f (build\\.ninja|\\./?\\.ninja_(deps|log)).*"
    category: write
    decision: allow
    message: "Safe ninja build cache cleanup - build.ninja, .ninja_deps, .ninja_log"

  # ===================================================================
  # Dangerous Recursive Operations
  # ===================================================================

  - name: "Block dangerous recursive operations"
    command_pattern: "^(rm|mv|cp)$"
    argument_pattern: ".*-r.*"
    category: write
    decision: ask
    message: "Recursive file operations require manual approval"

  # ===================================================================
  # Build Tools & Compilers
  # ===================================================================

  - name: "Allow build tools and compilers"
    command_pattern: "^(cd|cmake|make|dfu-util|npm|pip|pio|gcc|g\\+\\+|clang|arm-none-eabi-.*|ninja)$"
    category: other
    decision: allow

  - name: "Allow python3 for any script"
    command_pattern: "^python3$"
    category: other
    decision: allow
    message: "Python3 execution for scripts"

  - name: "Allow ARM cross-compiler tools (nm, objdump)"
    command_pattern: "^(arm-none-eabi-nm|arm-none-eabi-objdump)$"
    category: read
    decision: allow
    message: "ARM cross-compiler tools for inspecting ELF/binary firmware files (read-only)"

  - name: "Allow lsusb for USB device queries"
    command_pattern: "^lsusb$"
    category: read
    decision: allow
    message: "USB device listing tool (read-only)"

  - name: "Allow lsblk for block device information"
    command_pattern: "^lsblk$"
    category: read
    decision: allow
    message: "Block device listing tool (read-only)"

  - name: "Allow pkill for openocd termination"
    command_pattern: "^pkill$"
    argument_pattern: ".*openocd.*"
    category: other
    decision: allow
    message: "Process termination for openocd debugging server"

  - name: "Allow openocd binary from pico-sdk"
    command_pattern: "^/home/raymorris/\\.pico-sdk/openocd/0\\.12\\.0\\+dev/openocd$"
    category: other
    decision: allow
    message: "OpenOCD debugger from pico-sdk installation"

  - name: "Allow picotool for Pico device operations"
    command_pattern: "^picotool$"
    category: other
    decision: allow
    message: "Pico device tool for flashing and debugging"

  - name: "Allow emsdk environment setup"
    command_pattern: "^source$"
    argument_pattern: ".*emsdk(_env)?\\.sh.*"
    category: other
    decision: allow
    message: "Emscripten SDK environment setup for WASM builds"

  - name: "Allow python3 and scripts in claude/ directories"
    command_pattern: "^(python3|.*(\\.claude/|claude/).*)"
    argument_pattern: ".*(\\.claude/|claude/|fetch_issues\\.py).*"
    category: other
    decision: allow

  - name: "Allow view.sh command"
    command_pattern: "^.*view\\.sh$"
    category: other
    decision: allow
    message: "view.sh command allowed for viewing content"

  - name: "Allow gh-issue-view.sh script with any arguments"
    command_pattern: "^.*gh-issue-view\\.sh$"
    category: other
    decision: allow
    message: "gh-issue-view.sh script - fetches and displays GitHub issue/PR details with comments"

  - name: "Allow PR triage and analysis scripts"
    command_pattern: "^bash$"
    argument_pattern: ".*(claude/developer/scripts/triage/(fetch-next-pr|update-pr)|\\.github/scripts/(extract-pg-sizes-nm|check-pg-struct-sizes))\\.sh.*"
    category: other
    decision: allow
    message: "PR triage and parameter analysis scripts"

  - name: "Allow WASM SITL build scripts"
    command_pattern: ".*(build_sitl_wasm\\.sh|copy-wasm-to-configurator\\.js)$"
    category: other
    decision: allow
    message: "WASM SITL build script execution for development"

  - name: "Allow node copy-wasm-to-configurator.js"
    command_pattern: "^node$"
    argument_pattern: ".*copy-wasm-to-configurator\\.js.*"
    category: other
    decision: allow
    message: "Node.js script to copy WASM SITL artifacts to configurator resources"

  - name: "Allow node full_file/* scripts in markdown2mdx/ (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^node$"
    argument_pattern: ".*full_file/.*"
    category: other
    decision: allow
    precondition_script: |
      # Time-limited rule: Allow node full_file/* execution for 48 hours
      # Matches: node full_file/cli.js, node --test full_file/converter.test.js, etc.
      # Deadline: 2026-03-23 18:30:00 UTC
      # Started: 2026-03-21 18:30:00 UTC

      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || date "+%Y-%m-%d %H:%M:%S")

      if [[ "$CURRENT_TIME" < "$DEADLINE" ]]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to run node full_file/* scripts expires 2026-03-23 18:30 UTC"

  - name: "Allow any node execution after cd to markdown2mdx/ (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^node$"
    category: other
    decision: allow
    precondition_script: |
      # Time-limited rule: Allow ANY node execution after cd to markdown2mdx/ for 48 hours
      # This handles: cd .../markdown2mdx && node script.js ...
      # Deadline: 2026-03-23 18:30:00 UTC
      # Started: 2026-03-21 18:30:00 UTC

      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "2026-03-21 19:00:00")

      # Check if deadline has passed
      if [ "$CURRENT_TIME" = "2026-03-21 19:00:00" ] || [ "$CURRENT_TIME" \< "$DEADLINE" ]; then
        # Check current directory for markdown2mdx
        pwd | grep -q "markdown2mdx" && echo "allow" && exit 0

        # Fallback: allow anything in time window as markdown2mdx work
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to run any node command after cd to markdown2mdx/ expires 2026-03-23 18:30 UTC"

  - name: "Allow node execution in markdown2mdx/ (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^node$"
    argument_pattern: ".*markdown2mdx/.*"
    category: other
    decision: allow
    precondition_script: |
      # Time-limited rule: Allow node execution in markdown2mdx/ for 48 hours
      # Deadline: 2026-03-23 18:30:00 UTC
      # Started: 2026-03-21 18:30:00 UTC

      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || date "+%Y-%m-%d %H:%M:%S")

      if [[ "$CURRENT_TIME" < "$DEADLINE" ]]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to run node in markdown2mdx/ expires 2026-03-23 18:30 UTC"

  - name: "Allow WASM SITL output copy (build_SITL to resources/sitl)"
    command_pattern: "^cp$"
    argument_pattern: ".*(build_SITL/bin/SITL\\.(elf|wasm|wasm\\.map)|inav-configurator/resources/sitl/).*"
    category: write
    decision: allow
    message: "Copy WASM SITL artifacts to configurator resources directory"

  - name: "Allow SITL and special executables"
    command_pattern: "^(pkill|kill|.*SITL\\.elf$|.*pdf_indexer\\.py$)"
    category: other
    decision: allow

  - name: "Allow .cjs test file operations"
    command_pattern: "^(chmod|node)$"
    argument_pattern: ".*(test|tests)/.*\\.cjs.*"
    category: other
    decision: allow
    message: "CommonJS test file operations (chmod +x, node execution)"

  # ===================================================================
  # Common Read-Only Commands (Broad Allow List)
  # ===================================================================
  # These are safe commands that only read/display data

  - name: "Allow pgrep command"
    command_pattern: "^pgrep$"
    category: read
    decision: allow
    message: "pgrep - list processes by name (read-only)"

  - name: "Allow nc (netcat) command"
    command_pattern: "^nc$"
    category: other
    decision: allow
    message: "nc (netcat) - network utility for port testing and connections"

  - name: "Allow common read commands"
    command_pattern: "^(grep|egrep|find|cat|ls|head|tail|less|more|wc|sort|uniq|diff|stat|file|du|df|awk|sed|cut|xargs|printf|pwd|whoami|md5sum|lsusb|sleep|ss|date|touch|ld|rg|fd|pdfgrep|jq|readelf|objdump|nm|size|objcopy)$"
    category: read
    decision: allow

  - name: "Allow blackbox_decode command"
    command_pattern: "^(blackbox_decode|.*/blackbox_decode)$"
    category: other
    decision: allow
    message: "blackbox_decode is allowed for decoding INAV/Betaflight blackbox flight logs"

  # ===================================================================
  # Shell Control Structures & Parser Artifacts
  # ===================================================================
  # These handle bash syntax elements and parser edge cases

  - name: "Allow shell syntax elements"
    command_pattern: "^(#.*|\\(.*|if|then|else|elif|fi|for|while|do|done|case|esac|break|continue|\\[|\\[\\[|test|[0-9]>|[0-9]|>>|>|\\s*)$"
    category: read
    decision: allow

  # ===================================================================
  # Shell Variable Assignments
  # ===================================================================

  - name: "Allow PR variable assignments"
    command_pattern: "^PR=.*"
    category: read
    decision: allow
    message: "Shell variable assignment for PR number"

  - name: "Allow simple shell variable assignments (VAR=..., etc.)"
    command_pattern: "^[A-Z_][A-Z0-9_]*=.*"
    argument_pattern: "^(gh|git|curl|node|npm)\\s+.*"
    category: read
    decision: allow
    message: "Shell variable assignment before safe read/utility commands"

  - name: "Allow markdown2mdx conversion setup variables (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^(TMPDIR|DOCS|CONV|OUT|declare)=.*"
    category: other
    decision: allow
    precondition_script: |
      # Time-limited: Allow markdown2mdx setup variables for 48 hours
      # Variables: TMPDIR=, DOCS=, CONV=, OUT=, declare -A
      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "2026-03-21 19:00:00")

      if [ "$CURRENT_TIME" = "2026-03-21 19:00:00" ] || [ "$CURRENT_TIME" \< "$DEADLINE" ]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to markdown2mdx conversion setup expires 2026-03-23 18:30 UTC"

  - name: "Allow mkdir -p for markdown2mdx output directories (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^mkdir$"
    argument_pattern: ".*\\$OUT.*"
    category: write
    decision: allow
    precondition_script: |
      # Time-limited: Allow mkdir with $OUT variable for 48 hours
      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "2026-03-21 19:00:00")

      if [ "$CURRENT_TIME" = "2026-03-21 19:00:00" ] || [ "$CURRENT_TIME" \< "$DEADLINE" ]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to create markdown2mdx output directories expires 2026-03-23 18:30 UTC"

  - name: "Allow diff for markdown2mdx audit/comparison (temporary, expires 2026-03-23 18:30 UTC)"
    command_pattern: "^diff$"
    argument_pattern: ".*(markdown2mdx|audit-out|\\$DOCS|\\$OUT).*"
    category: read
    decision: allow
    precondition_script: |
      # Time-limited: Allow diff commands for markdown2mdx work for 48 hours
      DEADLINE="2026-03-23 18:30:00"
      CURRENT_TIME=$(date -u "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "2026-03-21 19:00:00")

      if [ "$CURRENT_TIME" = "2026-03-21 19:00:00" ] || [ "$CURRENT_TIME" \< "$DEADLINE" ]; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Temporary access to diff markdown2mdx audit files expires 2026-03-23 18:30 UTC"

  # ===================================================================
  # GitHub CLI Commands
  # ===================================================================

  - name: "Block gh pr review"
    command_pattern: "^gh$"
    argument_pattern: "^pr\\s+review.*"
    category: other
    decision: deny
    message: "STOP! The 'gh pr review' command is not allowed. Pull request reviews must be done through the GitHub web interface."

  - name: "Allow gh pr create to master in iNavFlight.github.io"
    command_pattern: "^gh$"
    argument_pattern: ".*pr\\s+create.*--base\\s+master.*"
    category: other
    decision: allow
    precondition_script: |
      # Allow PRs to master for iNavFlight.github.io (documentation site)
      # Block PRs to master for firmware repos
      ABS_CWD=$(pwd)
      if echo "$ABS_CWD" | grep -q "iNavFlight\.github\.io"; then
        echo "allow"
      else
        echo "deny"
      fi
    message: "Pull request to master allowed for iNavFlight.github.io documentation site"

  - name: "Block gh pr create targeting master"
    command_pattern: "^gh$"
    argument_pattern: ".*pr\\s+create.*--base\\s+master.*"
    category: other
    decision: deny
    message: "pull requests should never target master in firmware repos. Read CRITICAL-BEFORE-PR.md. (Allowed only for iNavFlight.github.io documentation site)"

  - name: "Allow gh api for repository queries"
    command_pattern: "^gh$"
    argument_pattern: "^api\\s+.*"
    category: read
    decision: allow
    message: "GitHub API queries"

  - name: "Allow GitHub CLI read operations"
    command_pattern: "^gh$"
    argument_pattern: "^(pr|issue|run|release|workflow|repo).*(list|view|diff|checks|download).*"
    category: read
    decision: allow

  - name: "Allow gh pr create for version bumps and feature PRs"
    command_pattern: "^gh$"
    argument_pattern: "^pr\\s+create.*"
    category: other
    decision: allow
    message: "Pull request creation allowed"

  - name: "Allow gh pr close"
    command_pattern: "^gh$"
    argument_pattern: "^pr\\s+close.*"
    category: other
    decision: allow
    message: "Pull request close allowed"

  # ===================================================================
  # GitHub API Commands (curl)
  # ===================================================================

  - name: "Allow curl to GitHub API and debugging endpoints"
    command_pattern: "^curl$"
    argument_pattern: ".*(api\\.github\\.com|http://(localhost|127\\.0\\.0\\.1):(9222|5174)).*"
    category: read
    decision: allow
    message: "GitHub API queries and Chrome DevTools/development server debugging endpoints"

  # ===================================================================
  # Runtime Conditional Rules (Using precondition_script)
  # ===================================================================

  - name: "Allow mkdir if directory exists"
    command_pattern: "^mkdir$"
    category: write
    precondition_script: |
      # Extract directory path from arguments (handles -p flag and multiple dirs)
      DIR=$(echo "{ARGS}" | sed 's/^-p *//' | awk '{print $1}')
      if [ -d "$DIR" ]; then
        echo "allow"
      else
        echo "ask"
      fi
